version: '3.8'

# 多实例支持：通过环境变量或直接在下方修改端口
# 单实例部署：直接修改下方 ports 的值即可，无需 .env
# 多实例部署：创建不同 .env 文件，用 docker compose -f docker/docker-compose.yml --env-file 启动

services:
  # ===== 管理面板（后端） =====
  neutrdice-panel:
    build:
      context: ../
      dockerfile: docker/backend.Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-docker-3001}-panel
    labels:
      - "neutrdice.instance=${COMPOSE_PROJECT_NAME:-docker-3001}-panel"
      - "neutrdice.type=system"
      - "neutrdice.name=NeutrDice Panel"
    ports:
      # 外部端口:内部端口，可直接修改外部端口，或通过环境变量 PANEL_PORT 设置
      - "${PANEL_PORT:-3001}:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${COMPOSE_PROJECT_NAME:-docker-3001}-data:/opt/neutrdice
      - ${COMPOSE_PROJECT_NAME:-docker-3001}-logs:/app/logs
    environment:
      - PANEL_PORT=3001
      - PANEL_PASSWORD=${PANEL_PASSWORD:-neutrdice2024}
      - DOCKER_SOCKET=/var/run/docker.sock
      - NEUTRDICE_BASE_DIR=/opt/neutrdice
      - NEUTRDICE_CONFIG=/opt/neutrdice/config.json
      - SEALDICE_CONTAINER=${COMPOSE_PROJECT_NAME:-docker-3001}-sealdice-core
      - NAPCAT_CONTAINER=${COMPOSE_PROJECT_NAME:-docker-3001}-napcat-core
      - LOG_DIR=/app/logs
    restart: unless-stopped
    networks:
      - ${COMPOSE_PROJECT_NAME:-docker-3001}-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===== 管理面板（前端） =====
  neutrdice-frontend:
    build:
      context: ../
      dockerfile: docker/frontend.Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-docker-3001}-frontend
    labels:
      - "neutrdice.instance=${COMPOSE_PROJECT_NAME:-docker-3001}-frontend"
      - "neutrdice.type=system"
      - "neutrdice.name=NeutrDice Frontend"
    ports:
      # 外部端口:内部端口，可直接修改外部端口，或通过环境变量 FRONTEND_PORT 设置
      - "${FRONTEND_PORT:-3000}:80"
    restart: unless-stopped
    depends_on:
      - neutrdice-panel
    networks:
      - ${COMPOSE_PROJECT_NAME:-docker-3001}-net

  # ===== 内置海豹核心 =====
  sealdice-core:
    image: shiaworkshop/sealdice:latest
    container_name: ${COMPOSE_PROJECT_NAME:-docker-3001}-sealdice-core
    labels:
      - "neutrdice.instance=${COMPOSE_PROJECT_NAME:-docker-3001}-sealdice-core"
      - "neutrdice.type=sealdice"
      - "neutrdice.name=海豹核心"
      - "neutrdice.built-in=true"
      - "neutrdice.channel=latest"
    ports:
      # 外部端口:内部端口
      - "${SEALDICE_PORT1:-32110}:3211"
      - "${SEALDICE_PORT2:-32111}:32111"
    volumes:
      - ${COMPOSE_PROJECT_NAME:-docker-3001}-sealdice-data:/opt/sealdice
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Asia/Shanghai
    cap_add:
      - NET_ADMIN
    privileged: true
    restart: unless-stopped
    networks:
      - ${COMPOSE_PROJECT_NAME:-docker-3001}-net

  # ===== 内置 NapCat QQ =====
  napcat-core:
    image: ghcr.io/napneko/nodenapcat:latest
    container_name: ${COMPOSE_PROJECT_NAME:-docker-3001}-napcat-core
    labels:
      - "neutrdice.instance=${COMPOSE_PROJECT_NAME:-docker-3001}-napcat-core"
      - "neutrdice.type=napcat"
      - "neutrdice.name=NapCat QQ"
      - "neutrdice.built-in=true"
    ports:
      # 外部端口:内部端口
      - "${NAPCAT_PORT1:-3002}:3000"
      - "${NAPCAT_PORT2:-3003}:3001"
      - "${NAPCAT_PORT3:-6099}:6099"
    volumes:
      - ${COMPOSE_PROJECT_NAME:-docker-3001}-napcat-data:/app/.config/QQ
      - ${COMPOSE_PROJECT_NAME:-docker-3001}-napcat-config:/app/napcat/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    networks:
      - ${COMPOSE_PROJECT_NAME:-docker-3001}-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

# ===== 网络配置 =====
networks:
  neutrdice-net:
    name: ${COMPOSE_PROJECT_NAME:-docker-3001}-net
    driver: bridge

# ===== 数据卷配置 =====
volumes:
  neutrdice-data:
    name: ${COMPOSE_PROJECT_NAME:-docker-3001}-data
  neutrdice-logs:
    name: ${COMPOSE_PROJECT_NAME:-docker-3001}-logs
  sealdice-data:
    name: ${COMPOSE_PROJECT_NAME:-docker-3001}-sealdice-data
  napcat-data:
    name: ${COMPOSE_PROJECT_NAME:-docker-3001}-napcat-data
  napcat-config:
    name: ${COMPOSE_PROJECT_NAME:-docker-3001}-napcat-config
